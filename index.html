<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bản Đồ Vận Hành Sự Kiện — TrueRace</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />

    :root {
      --primary: #e53935;
      --primary-dark: #b71c1c;
      --secondary: #ff8f00;
      --bg: #f5f6fa;
      --card: #ffffff;
      --text: #1a202c;
      --text-muted: #718096;
      --border: #e2e8f0;
      --sidebar-w: 400px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }

    /* ── HEADER ── */
    #header {
      background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary) 60%, var(--secondary) 100%);
      color: white; padding: 10px 16px;
      display: flex; align-items: center; gap: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,.25);
      z-index: 1000; position: relative;
    }
    #header .logo { font-size: 22px; font-weight: 800; letter-spacing: 1px; white-space: nowrap; }
    #header .subtitle { font-size: 12px; opacity: .8; }
    #filter-bar { display: flex; gap: 6px; flex-wrap: wrap; flex: 1; justify-content: center; }
    .filter-btn {
      background: rgba(255,255,255,.15); color: white; border: 1px solid rgba(255,255,255,.3);
      border-radius: 20px; padding: 4px 12px; font-size: 12px; cursor: pointer; transition: all .2s;
    }
    .filter-btn:hover, .filter-btn.active { background: white; color: var(--primary); font-weight: 600; }
    #header-actions { display: flex; gap: 6px; }
    .action-btn {
      background: rgba(255,255,255,.15); color: white; border: 1px solid rgba(255,255,255,.4);
      border-radius: 8px; padding: 5px 10px; font-size: 12px; cursor: pointer; transition: all .2s; white-space: nowrap;
    }
    .action-btn:hover { background: rgba(255,255,255,.3); }

    /* ── LAYOUT ── */
    #content { display: flex; height: calc(100vh - 54px); }
    #map { flex: 1; }

    /* ── SIDEBAR ── */
    #sidebar {
      width: var(--sidebar-w); background: white;
      display: none; flex-direction: column;
      box-shadow: -4px 0 20px rgba(0,0,0,.12);
      overflow: hidden; z-index: 500;
    }
    #sidebar.open { display: flex; }
    #sidebar-header {
      background: var(--primary); color: white; padding: 14px 16px;
      display: flex; align-items: center; gap: 10px;
    }
    #sidebar-province-name { font-size: 18px; font-weight: 700; flex: 1; }
    #sidebar-count { background: rgba(255,255,255,.25); border-radius: 12px; padding: 2px 10px; font-size: 13px; }
    .close-btn {
      background: rgba(255,255,255,.2); border: none; color: white;
      width: 30px; height: 30px; border-radius: 50%; cursor: pointer; font-size: 16px;
    }
    #sidebar-actions { padding: 12px 16px; border-bottom: 1px solid var(--border); display: flex; gap: 8px; }
    .add-btn {
      background: var(--primary); color: white; border: none;
      border-radius: 8px; padding: 8px 16px; font-size: 13px; font-weight: 600;
      cursor: pointer; display: flex; align-items: center; gap: 6px; flex: 1; justify-content: center;
    }
    .add-btn:hover { background: var(--primary-dark); }

    #sidebar-filter { padding: 8px 16px; border-bottom: 1px solid var(--border); display: flex; gap: 6px; flex-wrap: wrap; }
    .sf-btn {
      background: var(--bg); border: 1px solid var(--border); border-radius: 16px;
      padding: 3px 10px; font-size: 11px; cursor: pointer; transition: all .15s;
    }
    .sf-btn.active { background: var(--primary); color: white; border-color: var(--primary); }

    #sidebar-content { flex: 1; overflow-y: auto; padding: 12px 16px; }
    #sidebar-content:empty::after { content: 'Chưa có địa điểm nào. Nhấn "+ Thêm địa điểm" để bắt đầu.'; display: block; text-align: center; color: var(--text-muted); padding: 40px 0; font-size: 14px; }

    .location-card {
      border: 1px solid var(--border); border-radius: 12px; padding: 14px;
      margin-bottom: 12px; background: white; transition: box-shadow .2s;
    }
    .location-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,.1); }
    .card-header { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 10px; }
    .type-badge {
      border-radius: 8px; padding: 4px 10px; font-size: 11px; font-weight: 600;
      white-space: nowrap; flex-shrink: 0;
    }
    .type-hotel { background: #ebf8ff; color: #2b6cb0; }
    .type-motorbike { background: #fffaf0; color: #c05621; }
    .type-buucuc { background: #fff5f5; color: #c53030; }
    .type-other { background: #f7fafc; color: #4a5568; }
    .card-name { font-size: 15px; font-weight: 700; flex: 1; line-height: 1.3; }
    .card-actions { display: flex; gap: 4px; }
    .icon-btn {
      background: none; border: 1px solid var(--border); border-radius: 6px;
      width: 28px; height: 28px; cursor: pointer; font-size: 13px; display: flex; align-items: center; justify-content: center;
      transition: all .15s;
    }
    .icon-btn:hover { background: var(--bg); }
    .icon-btn.delete:hover { background: #fff5f5; border-color: #feb2b2; }
    .card-info { display: flex; flex-direction: column; gap: 6px; }
    .info-row { display: flex; gap: 8px; align-items: flex-start; font-size: 13px; }
    .info-icon { font-size: 14px; flex-shrink: 0; margin-top: 1px; }
    .info-text { color: var(--text); line-height: 1.4; flex: 1; }
    .info-text a { color: var(--primary); text-decoration: none; font-weight: 500; }
    .info-text a:hover { text-decoration: underline; }
    .price-tag { color: var(--secondary); font-weight: 700; font-size: 14px; }
    .notes-text { color: var(--text-muted); font-style: italic; }

    .empty-province { text-align: center; padding: 40px 20px; color: var(--text-muted); }
    .empty-province .empty-icon { font-size: 48px; margin-bottom: 12px; }
    .empty-province p { font-size: 14px; }

    /* ── CUSTOM MAP MARKER ── */
    .prov-marker {
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700; color: white;
      border: 2px solid white; box-shadow: 0 2px 6px rgba(0,0,0,.3); cursor: pointer;
      transition: transform .15s;
    }
    .prov-marker:hover { transform: scale(1.2); }
    .prov-marker.has-data { background: var(--primary); }
    .prov-marker.no-data { background: #a0aec0; }
    .prov-marker.island { background: linear-gradient(135deg, #e53935, #ff8f00); border-color: #ffd54f; }

    /* ── MODAL ── */
    #modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.5);
      z-index: 9000; display: none; align-items: center; justify-content: center;
    }
    #modal-overlay.open { display: flex; }
    #modal-box {
      background: white; border-radius: 16px; width: 480px; max-width: 95vw;
      max-height: 90vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,.3);
    }
    #modal-header {
      background: var(--primary); color: white; padding: 16px 20px;
      border-radius: 16px 16px 0 0; display: flex; align-items: center; justify-content: space-between;
    }
    #modal-title { font-size: 16px; font-weight: 700; }
    #modal-body { padding: 20px; }
    .form-group { margin-bottom: 14px; }
    label { display: block; font-size: 12px; font-weight: 600; color: var(--text-muted); margin-bottom: 5px; text-transform: uppercase; letter-spacing: .5px; }
    input, select, textarea {
      width: 100%; padding: 9px 12px; border: 1px solid var(--border); border-radius: 8px;
      font-size: 14px; font-family: inherit; color: var(--text); transition: border-color .2s;
    }
    input:focus, select:focus, textarea:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(229,57,53,.1); }
    textarea { min-height: 80px; resize: vertical; }
    .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
    .btn-save { background: var(--primary); color: white; border: none; border-radius: 8px; padding: 10px 24px; font-size: 14px; font-weight: 600; cursor: pointer; flex: 1; }
    .btn-save:hover { background: var(--primary-dark); }
    .btn-cancel { background: var(--bg); color: var(--text); border: 1px solid var(--border); border-radius: 8px; padding: 10px 20px; font-size: 14px; cursor: pointer; }
    .btn-cancel:hover { background: var(--border); }

    /* ── TOAST ── */
    #toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(100px);
      background: #1a202c; color: white; border-radius: 10px; padding: 10px 20px;
      font-size: 14px; z-index: 9999; transition: transform .3s ease; box-shadow: 0 4px 20px rgba(0,0,0,.3);
    }
    #toast.show { transform: translateX(-50%) translateY(0); }

    /* ── STATS BAR ── */
    #stats-bar {
      position: absolute; bottom: 20px; left: 20px; z-index: 999;
      background: white; border-radius: 12px; padding: 10px 16px;
      box-shadow: 0 4px 16px rgba(0,0,0,.15);
      display: flex; gap: 16px; align-items: center; font-size: 13px;
    }
    .stat-item { display: flex; flex-direction: column; align-items: center; }
    .stat-num { font-size: 20px; font-weight: 800; color: var(--primary); }
    .stat-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; }
    .stat-divider { width: 1px; height: 32px; background: var(--border); }

    /* Leaflet popup override */
    .leaflet-popup-content-wrapper { border-radius: 10px !important; }

    /* Scrollbar */
    #sidebar-content::-webkit-scrollbar { width: 4px; }
    #sidebar-content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    @media (max-width: 640px) {
      :root { --sidebar-w: 100vw; }
      #header { flex-wrap: wrap; }
      #filter-bar { order: 3; width: 100%; }
      #stats-bar { display: none; }
    }
  </style>
</head>
<body>

<!-- HEADER -->
<div id="header">
  <div>
    <div class="logo">🏃 TRUERACE</div>
    <div class="subtitle">Bản Đồ Vận Hành Sự Kiện</div>
  </div>
  <div id="filter-bar">
    <button class="filter-btn active" data-type="all" onclick="setGlobalFilter('all')">📍 Tất cả</button>
    <button class="filter-btn" data-type="hotel" onclick="setGlobalFilter('hotel')">🏨 Khách sạn/ Nhà nghỉ</button>
    <button class="filter-btn" data-type="motorbike" onclick="setGlobalFilter('motorbike')">🏍 Xe máy</button>
    <button class="filter-btn" data-type="buucuc" onclick="setGlobalFilter('buucuc')">📮 Bưu cục</button>
  </div>
  <div id="header-actions">
    <button class="action-btn" id="btn-refresh" onclick="refreshFromSheets()">🔄 Cập nhật</button>
    <span id="last-updated" style="font-size:11px;opacity:.7;align-self:center;white-space:nowrap;"></span>
  </div>
</div>

<!-- CONTENT -->
<div id="content">
  <div id="map"></div>
  <div id="sidebar">
    <div id="sidebar-header">
      <div>
        <div id="sidebar-province-name">Chọn tỉnh/thành</div>
        <div id="sidebar-count"></div>
      </div>
      <button class="close-btn" onclick="closeSidebar()">✕</button>
    </div>
    <div id="sidebar-actions" style="display:none"></div>
    <div id="sidebar-filter">
      <button class="sf-btn active" data-sf="all" onclick="setSidebarFilter('all')">Tất cả</button>
      <button class="sf-btn" data-sf="hotel" onclick="setSidebarFilter('hotel')">🏨 KS/NQ</button>
      <button class="sf-btn" data-sf="motorbike" onclick="setSidebarFilter('motorbike')">🏍 Xe máy</button>
      <button class="sf-btn" data-sf="buucuc" onclick="setSidebarFilter('buucuc')">📮 Bưu cục</button>
    </div>
    <div id="sidebar-content"></div>
  </div>
</div>

<!-- STATS BAR -->
<div id="stats-bar">
  <div class="stat-item">
    <div class="stat-num" id="stat-provinces">0</div>
    <div class="stat-label">Tỉnh/TP</div>
  </div>
  <div class="stat-divider"></div>
  <div class="stat-item">
    <div class="stat-num" id="stat-total">0</div>
    <div class="stat-label">Địa điểm</div>
  </div>
  <div class="stat-divider"></div>
  <div class="stat-item">
    <div class="stat-num" id="stat-hotels">0</div>
    <div class="stat-label">Khách sạn</div>
  </div>
  <div class="stat-divider"></div>
  <div class="stat-item">
    <div class="stat-num" id="stat-bikes">0</div>
    <div class="stat-label">Xe máy</div>
  </div>
</div>


<!-- TOAST -->
<div id="toast"></div>

const STORAGE_KEY = 'truerace-map-v2';

// ════════════════════════════════════════
//  GOOGLE SHEETS CONFIG
// ════════════════════════════════════════
// Paste your Google Sheet ID here after making the sheet public (Anyone with link - Viewer)
// Example: '1BxiMVs0XRA5nFMdKvBdBZjgmUUqptlbs74OgVE2upms'
const SHEET_ID = '1U6tPsvqXyCVSOO8vsvU03jbxjYWGRjBfliUxFNwS2fk';  // TrueRace Địa Điểm Công Tác

async function fetchFromSheets() {
  if (!SHEET_ID) return false;
  const btn = document.getElementById('btn-refresh');
  if (btn) { btn.textContent = '⏳ Đang tải...'; btn.disabled = true; }
  try {
    const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;
    const res = await fetch(url);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const text = await res.text();
    // Strip Google's JSONP wrapper: google.visualization.Query.setResponse({...})
    const jsonStr = text.replace(/^[^(]+\(/, '').replace(/\);?\s*$/, '');
    const json = JSON.parse(jsonStr);
    const rows = json.table.rows;
    const newData = {};
    rows.forEach((row) => {
      const c = row.c || [];
      const get = (i) => (c[i] && c[i].v != null) ? String(c[i].v).trim() : '';
      const province = get(0);
      const name = get(1);
      if (!province || !name) return;
      const loc = {
        id: 'gs-' + Math.random().toString(36).substr(2,8),
        name,
        type:     get(2) || 'other',
        address:  get(3),
        mapsLink: get(4),
        phone:    get(5),
        price:    get(6),
        notes:    get(7)
      };
      if (!newData[province]) newData[province] = [];
      newData[province].push(loc);
    });
    if (Object.keys(newData).length > 0) {
      data = newData;
      const now = new Date();
      const timeStr = now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');
      const el = document.getElementById('last-updated');
      if (el) el.textContent = 'Cập nhật ' + timeStr;
      return true;
    }
  } catch(e) {
    console.error('Sheets fetch error:', e);
    showToast('⚠️ Không thể tải từ Google Sheets. Đang dùng dữ liệu cục bộ.');
  } finally {
    if (btn) { btn.textContent = '🔄 Cập nhật'; btn.disabled = false; }
  }
  return false;
}

async function refreshFromSheets() {
  const ok = await fetchFromSheets();
  if (ok) {
    refreshMarkers();
    if (currentProvince) renderSidebarContent();
    updateStats();
    showToast('✅ Đã tải dữ liệu mới từ Google Sheets!');
  }
}

let data = {};
let globalFilter = 'all';
let sidebarFilter = 'all';
let currentProvince = null;
let editingId = null;
let markers = {};

// Load data from localStorage
function loadData() {
  const raw = localStorage.getItem(STORAGE_KEY);
  if (raw) {
    try { data = JSON.parse(raw); } catch(e) { data = {}; }
  }
  // First time: load sample data
  if (Object.keys(data).length === 0) {
    data = JSON.parse(JSON.stringify(SAMPLE_DATA));
    saveData();
  }
}
function saveData() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

// ════════════════════════════════════════
//  MARKER HELPERS
// ════════════════════════════════════════
function countForProvince(name) {
  const locs = data[name] || [];
  if (globalFilter === 'all') return locs.length;
  return locs.filter(l => l.type === globalFilter).length;
}

function makeIcon(name) {
  const count = countForProvince(name);
  const prov = PROVINCES.find(p => p.name === name);
  const isIsland = prov && prov.isIsland;
  const hasData = count > 0;
  const size = isIsland ? 28 : (hasData ? 30 : 14);
  const cls = isIsland ? 'prov-marker island' : (hasData ? 'prov-marker has-data' : 'prov-marker no-data');
  return L.divIcon({
    html: `<div class="${cls}" style="width:${size}px;height:${size}px;font-size:${size < 20 ? '0' : '12'}px">${hasData ? count : ''}</div>`,
    className: '',
    iconSize: [size, size],
    iconAnchor: [size/2, size/2],
    popupAnchor: [0, -size/2]
  });
}

// ════════════════════════════════════════
//  BUILD MARKERS
// ════════════════════════════════════════
function buildMarkers() {
  PROVINCES.forEach(prov => {
    const marker = L.marker([prov.lat, prov.lng], { icon: makeIcon(prov.name) })
      .addTo(map)
      .on('click', () => openSidebar(prov.name));

    const label = prov.isIsland
      ? `🏝️ ${prov.name} (Việt Nam)`
      : prov.name;
    marker.bindTooltip(label, { direction: 'top', offset: [0,-8], opacity: 0.95 });
    markers[prov.name] = marker;
  });
}

function refreshMarkers() {
  PROVINCES.forEach(prov => {
    if (markers[prov.name]) {
      markers[prov.name].setIcon(makeIcon(prov.name));
    }
  });
  updateStats();
}

// ════════════════════════════════════════
//  SIDEBAR
// ════════════════════════════════════════
function openSidebar(provinceName) {
  currentProvince = provinceName;
  sidebarFilter = 'all';
  document.querySelectorAll('.sf-btn').forEach(b => b.classList.toggle('active', b.dataset.sf === 'all'));
  document.getElementById('sidebar-province-name').textContent = provinceName;
  const sid = document.getElementById('sidebar');
  sid.classList.add('open');
  renderSidebarContent();
}

function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  currentProvince = null;
}

function renderSidebarContent() {
  if (!currentProvince) return;
  let locs = data[currentProvince] || [];
  if (sidebarFilter !== 'all') locs = locs.filter(l => l.type === sidebarFilter);

  const countEl = document.getElementById('sidebar-count');
  const total = (data[currentProvince] || []).length;
  countEl.textContent = total > 0 ? `${total} địa điểm` : 'Chưa có dữ liệu';

  const el = document.getElementById('sidebar-content');
  if (locs.length === 0) {
    el.innerHTML = `<div class="empty-province"><div class="empty-icon">📍</div><p>Chưa có địa điểm${sidebarFilter !== 'all' ? ' thuộc loại này' : ''}.<br/>Nhấn <b>+ Thêm địa điểm</b> để bắt đầu.</p></div>`;
    return;
  }
  el.innerHTML = locs.map(loc => renderCard(loc)).join('');
}

const TYPE_META = {
  hotel:     { label:'Khách sạn/ Nhà nghỉ', cls:'type-hotel',     icon:'🏨' },
  motorbike: { label:'Xe máy',             cls:'type-motorbike', icon:'🏍' },
  buucuc:    { label:'Bưu cục',            cls:'type-buucuc',    icon:'📮' },
  other:     { label:'Khác',               cls:'type-other',     icon:'📍' },
};

function renderCard(loc) {
  const meta = TYPE_META[loc.type] || TYPE_META.other;
  return `
  <div class="location-card" id="card-${loc.id}">
    <div class="card-header">
      <span class="type-badge ${meta.cls}">${meta.icon} ${meta.label}</span>
      <span class="card-name">${escHtml(loc.name)}</span>
      <div class="card-actions"></div>
    </div>
    <div class="card-info">
      ${loc.address ? `<div class="info-row"><span class="info-icon">📍</span><span class="info-text">${escHtml(loc.address)}${loc.mapsLink ? ` &nbsp;<a href="${escHtml(loc.mapsLink)}" target="_blank">→ Maps</a>` : ''}</span></div>` : ''}
      ${loc.phone ? `<div class="info-row"><span class="info-icon">📞</span><span class="info-text"><a href="tel:${escHtml(loc.phone)}">${escHtml(loc.phone)}</a></span></div>` : ''}
      ${loc.price ? `<div class="info-row"><span class="info-icon">💰</span><span class="info-text price-tag">${escHtml(loc.price)}</span></div>` : ''}
      ${loc.notes ? `<div class="info-row"><span class="info-icon">📝</span><span class="info-text notes-text">${escHtml(loc.notes)}</span></div>` : ''}
    </div>
  </div>`;
}

// ════════════════════════════════════════
//  FILTERS
// ════════════════════════════════════════
function setGlobalFilter(type) {
  globalFilter = type;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.dataset.type === type));
  refreshMarkers();
  if (currentProvince) renderSidebarContent();
}

function setSidebarFilter(type) {
  sidebarFilter = type;
  document.querySelectorAll('.sf-btn').forEach(b => b.classList.toggle('active', b.dataset.sf === type));
  renderSidebarContent();
}

// ════════════════════════════════════════
//  ADD / EDIT / DELETE
// ════════════════════════════════════════
function openAddModal() {
  editingId = null;
  document.getElementById('modal-title').textContent = `Thêm địa điểm — ${currentProvince}`;
  clearForm();
  document.getElementById('modal-overlay').classList.add('open');
}

function openEditModal(id) {
  const locs = data[currentProvince] || [];
  const loc = locs.find(l => l.id === id);
  if (!loc) return;
  editingId = id;
  document.getElementById('modal-title').textContent = 'Chỉnh sửa địa điểm';
  document.getElementById('f-name').value = loc.name || '';
  document.getElementById('f-type').value = loc.type || 'hotel';
  document.getElementById('f-address').value = loc.address || '';
  document.getElementById('f-maps').value = loc.mapsLink || '';
  document.getElementById('f-phone').value = loc.phone || '';
  document.getElementById('f-price').value = loc.price || '';
  document.getElementById('f-notes').value = loc.notes || '';
  document.getElementById('modal-overlay').classList.add('open');
}

function clearForm() {
  ['f-name','f-type','f-address','f-maps','f-phone','f-price','f-notes'].forEach(id => {
    const el = document.getElementById(id);
    if (el.tagName === 'SELECT') el.value = 'hotel';
    else el.value = '';
  });
}

function saveLocation() {
  const name = document.getElementById('f-name').value.trim();
  if (!name) { showToast('⚠️ Vui lòng nhập tên địa điểm!'); return; }
  if (!currentProvince) { showToast('⚠️ Chưa chọn tỉnh/thành!'); return; }

  const loc = {
    id: editingId || ('loc-' + Date.now()),
    name,
    type:     document.getElementById('f-type').value,
    address:  document.getElementById('f-address').value.trim(),
    mapsLink: document.getElementById('f-maps').value.trim(),
    phone:    document.getElementById('f-phone').value.trim(),
    price:    document.getElementById('f-price').value.trim(),
    notes:    document.getElementById('f-notes').value.trim(),
  };

  if (!data[currentProvince]) data[currentProvince] = [];
  if (editingId) {
    const idx = data[currentProvince].findIndex(l => l.id === editingId);
    if (idx >= 0) data[currentProvince][idx] = loc;
  } else {
    data[currentProvince].push(loc);
  }

  saveData();
  closeModal();
  renderSidebarContent();
  refreshMarkers();
  showToast(editingId ? '✅ Đã cập nhật địa điểm!' : '✅ Đã thêm địa điểm mới!');
}

function deleteLocation(id) {
  if (!confirm('Xóa địa điểm này?')) return;
  if (!data[currentProvince]) return;
  data[currentProvince] = data[currentProvince].filter(l => l.id !== id);
  if (data[currentProvince].length === 0) delete data[currentProvince];
  saveData();
  renderSidebarContent();
  refreshMarkers();
  showToast('🗑️ Đã xóa địa điểm!');
}

// ════════════════════════════════════════
//  MODAL CONTROL
// ════════════════════════════════════════
function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
}
function handleOverlayClick(e) {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
}

// ════════════════════════════════════════
//  EXPORT / IMPORT
// ════════════════════════════════════════
function exportData() {
  const json = JSON.stringify(data, null, 2);
  const blob = new Blob([json], { type:'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `truerace-map-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('📤 Đã xuất dữ liệu thành công!');
}
function triggerImport() {
  document.getElementById('import-input').click();
}
function importData(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const imported = JSON.parse(ev.target.result);
      if (typeof imported !== 'object') throw new Error();
      if (!confirm(`Nhập dữ liệu từ file "${file.name}"?\n⚠️ Dữ liệu hiện tại sẽ bị THAY THẾ hoàn toàn.`)) return;
      data = imported;
      saveData();
      refreshMarkers();
      if (currentProvince) renderSidebarContent();
      showToast('📥 Nhập dữ liệu thành công!');
    } catch { showToast('❌ File không hợp lệ!'); }
    e.target.value = '';
  };
  reader.readAsText(file);
}

// ════════════════════════════════════════
//  STATS
// ════════════════════════════════════════
function updateStats() {
  const allLocs = Object.values(data).flat();
  const provincesWithData = Object.keys(data).filter(k => data[k] && data[k].length > 0);
  document.getElementById('stat-provinces').textContent = provincesWithData.length;
  document.getElementById('stat-total').textContent = allLocs.length;
  document.getElementById('stat-hotels').textContent = allLocs.filter(l => l.type === 'hotel').length;
  document.getElementById('stat-bikes').textContent = allLocs.filter(l => l.type === 'motorbike').length;
}

// ════════════════════════════════════════
//  TOAST
// ════════════════════════════════════════
let toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2800);
}

// ════════════════════════════════════════
//  UTILS
// ════════════════════════════════════════
function escHtml(str) {
  if (!str) return '';
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ════════════════════════════════════════
//  INIT
// ════════════════════════════════════════
async function init() {
  loadData(); // load sample/localStorage first (instant)
  buildMarkers();
  updateStats();
  // Then try to fetch from Google Sheets
  const fromSheets = await fetchFromSheets();
  if (fromSheets) {
    refreshMarkers();
    if (currentProvince) renderSidebarContent();
    updateStats();
  }
  setTimeout(() => {
    showToast('🗺️ Click vào tỉnh/thành trên bản đồ để xem địa điểm!');
  }, 1000);
}
init();
</script>
