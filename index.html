<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Bản đồ Việt Nam - Operation Map</title>
<style>
  body { font-family: Arial, sans-serif; margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; }
  #map-container { width: 90%; max-width: 1200px; margin-top: 20px; }
  svg { width: 100%; height: auto; border: 1px solid #ccc; }
  path { stroke: #fff; stroke-width: 0.5; cursor: pointer; transition: fill 0.2s; }
  path.north { fill: #a2d2ff; }
  path.central { fill: #ffd6a5; }
  path.south { fill: #b5ead7; }
  path:hover { fill: #ffb4a2; }
  #tooltip { position: absolute; background: rgba(0,0,0,0.7); color: #fff; padding: 4px 8px; border-radius: 4px; pointer-events: none; font-size: 14px; display: none; }
  #info-panel { margin-top: 20px; width: 90%; max-width: 800px; padding: 10px; border: 1px solid #ccc; min-height: 100px; }
</style>
</head>
<body>

<h2>Bản đồ Việt Nam - Operation Map</h2>
<div id="map-container">
  <svg id="vnMap" viewBox="0 0 1200 2349">
    <!-- === Dán toàn bộ 63 path SVG tại đây === -->
    <!-- Mỗi path ID = province_id trong Google Sheet -->
    <!-- Ví dụ: -->
    <path id="ha_noi" class="north" d="M514.69922 155.90039 L514.09961 156.19922 L… z" onmouseover="showTooltip(evt,'Hà Nội')" onmouseout="hideTooltip()" />
    <path id="ho_chi_minh" class="south" d="M… z" onmouseover="showTooltip(evt,'Hồ Chí Minh')" onmouseout="hideTooltip()" />
    <path id="da_nang" class="central" d="M… z" onmouseover="showTooltip(evt,'Đà Nẵng')" onmouseout="hideTooltip()" />
    <!-- … Thêm các tỉnh còn lại -->
  </svg>
</div>

<div id="tooltip"></div>

<div id="info-panel">
  <strong>Thông tin tỉnh:</strong>
  <div id="province-info">Bấm vào tỉnh để xem dữ liệu từ Google Sheet</div>
</div>

<script>
// Tooltip
const tooltip = document.getElementById('tooltip');
function showTooltip(evt, name) {
  tooltip.style.display = 'block';
  tooltip.innerText = name;
  tooltip.style.left = (evt.pageX + 10) + 'px';
  tooltip.style.top = (evt.pageY + 10) + 'px';
}
function hideTooltip() {
  tooltip.style.display = 'none';
}

// Load CSV từ Google Sheet
const sheetCSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRTHAfXwcrhnhMDq0pgLjdrnIZf8f8xn01kPoKNxDoMTqph4coCQPIe67vcixVmPIjAdE6AV73jMXfh/pub?output=csv';
let rawData = [];

fetch(sheetCSV)
  .then(res => res.text())
  .then(csvText => {
    const lines = csvText.split('\n');
    const headers = lines[0].split(',');
    rawData = lines.slice(1).map(line => {
      const values = line.split(',');
      let obj = {};
      headers.forEach((h, i) => obj[h.trim()] = values[i]?.trim());
      return obj;
    });
    console.log('CSV loaded:', rawData.length, 'rows');
  });

// Click tỉnh hiển thị info
document.querySelectorAll('#vnMap path').forEach(path => {
  path.addEventListener('click', () => {
    const id = path.id;
    const data = rawData.find(d => d.province_id === id);
    if(data){
      let html = '<ul>';
      for(const key in data){
        if(key !== 'province_id' && data[key]) html += `<li><strong>${key}:</strong> ${data[key]}</li>`;
      }
      html += '</ul>';
      document.getElementById('province-info').innerHTML = html;
    } else {
      document.getElementById('province-info').innerHTML = 'Không có dữ liệu cho tỉnh này';
    }
  });
});
</script>

</body>
</html>
