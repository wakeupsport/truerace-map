async function fetchFromSheets() {
  if (!SHEET_ID) return false;
  const btn = document.getElementById('btn-refresh');
  if (btn) { btn.textContent = '芒聫鲁 脛聬ang t谩潞拢i...'; btn.disabled = true; }
  try {
    const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;
    const res = await fetch(url);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const text = await res.text();
    // Strip Google's JSONP wrapper: google.visualization.Query.setResponse({...})
    const jsonStr = text.replace(/^[^(]+\(/, '').replace(/\);?\s*$/, '');
    const json = JSON.parse(jsonStr);
    const rows = json.table.rows;
    const newData = {};
    rows.forEach((row) => {
      const c = row.c || [];
      const get = (i) => (c[i] && c[i].v != null) ? String(c[i].v).trim() : '';
      const province = get(0);
      const name = get(1);
      if (!province || !name) return;
      const loc = {
        id: 'gs-' + Math.random().toString(36).substr(2,8),
        name,
        type:     get(2) || 'other',
        address:  get(3),
        mapsLink: get(4),
        phone:    get(5),
        price:    get(6),
        notes:    get(7)
      };
      if (!newData[province]) newData[province] = [];
      newData[province].push(loc);
    });
    if (Object.keys(newData).length > 0) {
      data = newData;
      const now = new Date();
      const timeStr = now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');
      const el = document.getElementById('last-updated');
      if (el) el.textContent = 'C谩潞颅p nh谩潞颅t ' + timeStr;
      return true;
    }
  } catch(e) {
    console.error('Sheets fetch error:', e);
    showToast('芒職聽茂赂聫 Kh脙麓ng th谩禄聝 t谩潞拢i t谩禄芦 Google Sheets. 脛聬ang d脙鹿ng d谩禄炉 li谩禄聡u c谩禄楼c b谩禄聶.');
  } finally {
    if (btn) { btn.textContent = '冒聼聰聞 C谩潞颅p nh谩潞颅t'; btn.disabled = false; }
  }
  return false;
}

}

function countForProvince(name) {
  const locs = data[name] || [];
  if (globalFilter === 'all') return locs.length;
  return locs.filter(l => l.type === globalFilter).length;
}

function makeIcon(name) {
  const count = countForProvince(name);
  const prov = PROVINCES.find(p => p.name === name);
  const isIsland = prov && prov.isIsland;
  const hasData = count > 0;
  const size = isIsland ? 28 : (hasData ? 30 : 14);
  const cls = isIsland ? 'prov-marker island' : (hasData ? 'prov-marker has-data' : 'prov-marker no-data');
  return L.divIcon({
    html: `<div class="${cls}" style="width:${size}px;height:${size}px;font-size:${size < 20 ? '0' : '12'}px">${hasData ? count : ''}</div>`,
    className: '',
    iconSize: [size, size],
    iconAnchor: [size/2, size/2],
    popupAnchor: [0, -size/2]
  });
}

  PROVINCES.forEach(prov => {
    const marker = L.marker([prov.lat, prov.lng], { icon: makeIcon(prov.name) })
      .addTo(map)
      .on('click', () => openSidebar(prov.name));

    const label = prov.isIsland
      ? `冒聼聫聺茂赂聫 ${prov.name} (Vi谩禄聡t Nam)`
      : prov.name;
    marker.bindTooltip(label, { direction: 'top', offset: [0,-8], opacity: 0.95 });
    markers[prov.name] = marker;
  });
}

function refreshMarkers() {
  PROVINCES.forEach(prov => {
    if (markers[prov.name]) {
      markers[prov.name].setIcon(makeIcon(prov.name));
    }
  });
  updateStats();
}

function openSidebar(provinceName) {
  currentProvince = provinceName;
  sidebarFilter = 'all';
  document.querySelectorAll('.sf-btn').forEach(b => b.classList.toggle('active', b.dataset.sf === 'all'));
  document.getElementById('sidebar-province-name').textContent = provinceName;
  const sid = document.getElementById('sidebar');
  sid.classList.add('open');
  renderSidebarContent();
}

function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  currentProvince = null;
}

function renderSidebarContent() {
  if (!currentProvince) return;
  let locs = data[currentProvince] || [];
  if (sidebarFilter !== 'all') locs = locs.filter(l => l.type === sidebarFilter);

  const countEl = document.getElementById('sidebar-count');
  const total = (data[currentProvince] || []).length;
  countEl.textContent = total > 0 ? `${total} 脛聭谩禄聥a 脛聭i谩禄聝m` : 'Ch脝掳a c脙鲁 d谩禄炉 li谩禄聡u';

  const el = document.getElementById('sidebar-content');
  if (locs.length === 0) {
    el.innerHTML = `<div class="empty-province"><div class="empty-icon">冒聼聯聧</div><p>Ch脝掳a c脙鲁 脛聭谩禄聥a 脛聭i谩禄聝m${sidebarFilter !== 'all' ? ' thu谩禄聶c lo谩潞隆i n脙聽y' : ''}.<br/>Nh谩潞楼n <b>+ Th脙陋m 脛聭谩禄聥a 脛聭i谩禄聝m</b> 脛聭谩禄聝 b谩潞炉t 脛聭谩潞搂u.</p></div>`;
    return;
  }
  el.innerHTML = locs.map(loc => renderCard(loc)).join('');
}

const TYPE_META = {
  hotel:     { label:'Kh脙隆ch s谩潞隆n/ Nh脙聽 ngh谩禄聣', cls:'type-hotel',     icon:'冒聼聫篓' },
  motorbike: { label:'Xe m脙隆y',             cls:'type-motorbike', icon:'冒聼聫聧' },

function renderCard(loc) {
  const meta = TYPE_META[loc.type] || TYPE_META.other;
  return `
  <div class="location-card" id="card-${loc.id}">
    <div class="card-header">
      <span class="type-badge ${meta.cls}">${meta.icon} ${meta.label}</span>
      <span class="card-name">${escHtml(loc.name)}</span>
      <div class="card-actions"></div>
    </div>
    <div class="card-info">
      ${loc.address ? `<div class="info-row"><span class="info-icon">冒聼聯聧</span><span class="info-text">${escHtml(loc.address)}${loc.mapsLink ? ` &nbsp;<a href="${escHtml(loc.mapsLink)}" target="_blank">芒聠聮 Maps</a>` : ''}</span></div>` : ''}

}

function clearForm() {
  ['f-name','f-type','f-address','f-maps','f-phone','f-price','f-notes'].forEach(id => {
    const el = document.getElementById(id);
    if (el.tagName === 'SELECT') el.value = 'hotel';
    else el.value = '';
  });
}

function saveLocation() {
  const name = document.getElementById('f-name').value.trim();
  if (!name) { showToast('芒職聽茂赂聫 Vui l脙虏ng nh谩潞颅p t脙陋n 脛聭谩禄聥a 脛聭i谩禄聝m!'); return; }
  if (!currentProvince) { showToast('芒職聽茂赂聫 Ch脝掳a ch谩禄聧n t谩禄聣nh/th脙聽nh!'); return; }

  const loc = {
    id: editingId || ('loc-' + Date.now()),
    name,
    type:     document.getElementById('f-type').value,
    address:  document.getElementById('f-address').value.trim(),
    mapsLink: document.getElementById('f-maps').value.trim(),
    phone:    document.getElementById('f-phone').value.trim(),
    price:    document.getElementById('f-price').value.trim(),
    notes:    document.getElementById('f-notes').value.trim(),
  };

  if (!data[currentProvince]) data[currentProvince] = [];
  if (editingId) {
    const idx = data[currentProvince].findIndex(l => l.id === editingId);
    if (idx >= 0) data[currentProvince][idx] = loc;
  } else {
    data[currentProvince].push(loc);
  }

  saveData();
  closeModal();
  renderSidebarContent();
  refreshMarkers();
  showToast(editingId ? '芒聹聟 脛聬脙拢 c谩潞颅p nh谩潞颅t 脛聭谩禄聥a 脛聭i谩禄聝m!' : '芒聹聟 脛聬脙拢 th脙陋m 脛聭谩禄聥a 脛聭i谩禄聝m m谩禄聸i!');
}

function deleteLocation(id) {
  if (!confirm('X脙鲁a 脛聭谩禄聥a 脛聭i谩禄聝m n脙聽y?')) return;
  if (!data[currentProvince]) return;
  data[currentProvince] = data[currentProvince].filter(l => l.id !== id);
  if (data[currentProvince].length === 0) delete data[currentProvince];
  saveData();
  renderSidebarContent();
  refreshMarkers();
  showToast('冒聼聴聭茂赂聫 脛聬脙拢 x脙鲁a 脛聭谩禄聥a 脛聭i谩禄聝m!');
}

function exportData() {
  const json = JSON.stringify(data, null, 2);
  const blob = new Blob([json], { type:'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `truerace-map-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('冒聼聯陇 脛聬脙拢 xu谩潞楼t d谩禄炉 li谩禄聡u th脙聽nh c脙麓ng!');
}
function triggerImport() {
  document.getElementById('import-input').click();
}
function importData(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const imported = JSON.parse(ev.target.result);
      if (typeof imported !== 'object') throw new Error();
      if (!confirm(`Nh谩潞颅p d谩禄炉 li谩禄聡u t谩禄芦 file "${file.name}"?\n芒職聽茂赂聫 D谩禄炉 li谩禄聡u hi谩禄聡n t谩潞隆i s谩潞陆 b谩禄聥 THAY TH谩潞戮 ho脙聽n to脙聽n.`)) return;
      data = imported;
      saveData();
      refreshMarkers();
      if (currentProvince) renderSidebarContent();
      showToast('冒聼聯楼 Nh谩潞颅p d谩禄炉 li谩禄聡u th脙聽nh c脙麓ng!');
    } catch { showToast('芒聺聦 File kh脙麓ng h谩禄拢p l谩禄聡!'); }
    e.target.value = '';
  };
  reader.readAsText(file);
}
